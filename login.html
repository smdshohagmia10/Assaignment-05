<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Tailwind and DaisyUi link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- link css  -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="w-1/4 mx-auto bg-base-100 border-base-300 rounded-box  border p-4 mt-20 space-y-[24px]">
        <div class=" text-center">
            <div class="flex justify-center ">
                <img class="justify-center flex" src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="text-[#1F2937] text-2xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] text-[14px]">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset ">

            <label class="label ">Username</label>
            <input type="text" id="username" class="input input w-full" placeholder="Enter Username"/>

            <label class="label ">Password</label>
            <input type="password" id="password" class="input input w-full" placeholder="Enter Your Password" />

            <button onclick="login()" class="btn btn-primary mt-4">Login</button>
        </fieldset>
        <div>
            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink mx-4 text-gray-500 font-medium">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="text-center">
                <p class="text-[#64748B] text-[14px]">Demo Credentials:</p>
                <div class="bg-base-200 py-7">
                    <h2 class=" font-bold">Username: <span class="text-[#64748B]">admin</span></h2>
                    <h2 class=" font-bold">Password: <span class="text-[#64748B]">admin123</span></h2>
                </div>
            </div>
        </div>
    </div>
    <script>

    function login(){

        const user = document.getElementById("username").value
        const pass = document.getElementById("password").value

        if(user === "admin" && pass === "admin123"){
         window.location.href = "maiin.html"
        }
        else{
        alert("Invalid Credentials")
        }

    }
</script>
</body>
</html>
