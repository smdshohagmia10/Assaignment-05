<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind and DaisyUi link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- link css  -->
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-[#F8FAFC]">
    <header>
        <div class=" bg-base-100 shadow-sm sm:flex justify-between w-11/12 mx-auto">
            <div class="flex items-center gap-1 ">
                <img class="w-8 " src="./assets/github-logo.png" alt="">
                <h2 class="text-[#1F2937] font-semibold text-2xl">GitHub Issues Tracker</h2>
            </div>
            <br>
            <div class="flex gap-1">
              <input id="search-input" type="text" placeholder="Search"class="input input-bordered w-fit" />

                <button id="search-btn" class="btn btn-active btn-primary border-none">+ New Issue</button>
            </div>
        </div>
    </header>

    <main  class="w-11/12 mx-auto mt-11">
     <!-- button section  -->
      <section class="shadow-sm rounded-sm px-4 py-2 mb-5">
        <button onclick="filterCards(this,'all')" class="filter-btn btn-primary btn  ">All</button>
        <button onclick="filterCards(this,'open')" class="filter-btn btn-primary btn btn-outline">Open</button>
        <button onclick="filterCards(this,'closed')" class="filter-btn btn-primary btn btn-outline">Closed</button>
      </section>
      <!-- issue section  -->
       <section  class="flex justify-between items-center shadow-sm rounded-sm px-4 py-2">
        <div class="flex gap-2 items-center">
          <div class="bg-indigo-100 p-2 rounded-full">
            <img class="" src="./assets/Aperture.png " alt="">
          </div>
          <div>
            <h2 class="text-lg font-bold"> <span id="card-count">0</span> Issues</h2>
            <p class="text-gray-500 ">Track and manage your project issues</p>
          </div>
        </div>
        <!-- right side -->
         <div class="flex gap-3">
          <p class="flex items-center gap-1 font-semibold"><span class="status bg-green-500"></span>Open</p>
          <p class="flex items-center gap-1 font-semibold"><span class="status bg-purple-500"></span>Closed</p>
         </div>

       </section>
         <div id="loding" class="flex h-[50vh] justify-center items-center col-span-full hidden">
             <span class="loading loading-spinner loading-xl"></span>
         </div>

       <section id="card-containar" class="grid md:grid-cols-4 gap-3 p-4 shadow-sm">      

        <div class="shadow-sm border-t-3 border-green-700 rounded-md ">
            <div class="flex justify-between p-3">
              <!-- left side -->
              <div id="open-closed" class="flex">
                <img class="hidden w-full" src="image/Closed- Status .png" alt="">
                <img class=" w-full" src="image/Open-Status.png" alt="">
              </div>
              <div id="h-m-d">
                <h3 class="badge badge-error badge-soft rounded-full font-semibold">HIGH</h3>
                <h3 class="hidden badge badge-warning badge-soft rounded-full font-semibold">MEDIUM</h3>
                <h3 class="hidden badge badge-neutral badge-soft rounded-full font-semibold text-gray-500">LOW</h3>
              </div>
            </div>
        </div>
       </section>
 </main>

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="modal-body">
     <div class="space-y-2">
            <h2 class="text-2xl font-semibold">Fix broken image uploads</h2>  
            <div class="flex gap-2">
              <p class="rounded-full bg-success text-white w-fit px-2 font-semibold">Opened </p>
              <p class="hidden rounded-full bg-error text-white w-fit px-2 font-semibold">Closed </p>
              <p class="text-gray-500"> <span class="status status-neutral mb-1"></span> Opened by Fahim Ahmed</p>
              <p class="text-gray-500"> <span class="status status-neutral mb-1"></span> 22/02/2026</p>             
            </div>
        </div>
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary btn-outline">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="./script.js"></script>
</body>
</html>
